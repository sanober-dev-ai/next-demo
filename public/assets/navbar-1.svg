            body{
              margin: 0;
    padding: 0;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
    height: 100vh;
            }
            .cls-1 {
              clip-path: url(#clip-logo);
            }
      
            .cls-2, .cls-3 {
