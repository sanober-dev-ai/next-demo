            }
      
            .cls-6 {
              fill: #fff;
            }
path {
  stroke-dasharray:500; 
  stroke-dashoffset:500;
  animation: draw 7.5s infinite;
  animation-delay:1s;
}
circle {
  opacity: 0;
  animation: opacity 7.5s infinite;
  animation-delay:1s;
}
#Ellipse_18{
    opacity: 0;
  animation: opacity 2.5s infinite;
  animation-delay:3s;
}
@keyframes opacity{
	from {opacity: 0;}
	to {opacity: 1;}
}
@keyframes pulse{
	from{
        transform: scale(0);
    }
	to {
        transform: scale(1);
    }
}
 
 @keyframes draw {
  to {
    stroke-dashoffset: 0;
  }
}

